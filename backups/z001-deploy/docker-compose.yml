services:
  db:
    image: mysql:8.3.0
    command: --mysql-native-password=ON
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: wewe-rss
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ${STACK_ROOT}/data/wewe-rss/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 45s
      retries: 10

  app:
    image: wewe-rss:${WEWE_RSS_IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD}@db:3306/wewe-rss?schema=public&connect_timeout=30&pool_timeout=30&socket_timeout=30
      AUTH_CODE: ${AUTH_CODE}
      SERVER_ORIGIN_URL: ${SERVER_ORIGIN_URL}
      CRON_EXPRESSION: ${CRON_EXPRESSION}
      UPDATE_DELAY_TIME: ${UPDATE_DELAY_TIME}
      MAX_REQUEST_PER_MINUTE: ${MAX_REQUEST_PER_MINUTE}
    expose:
      - "4000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:4000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  bridge:
    build:
      context: ../../bridge
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    env_file:
      - .env
    environment:
      BRIDGE_SQLITE_PATH: /state/bridge.db
      BRIDGE_FEEDS_FILE: /config/feeds.json
      BRIDGE_GIT_BARE_REPO: /repos/folo-rss-vault.git
      BRIDGE_GIT_WORK_TREE: /worktrees/folo-rss-vault
    volumes:
      - ${STACK_ROOT}/data/folo-obsidian-bridge/config:/config
      - ${STACK_ROOT}/data/folo-obsidian-bridge/state:/state
      - ${STACK_ROOT}/data/obsidian/repos:/repos
      - ${STACK_ROOT}/data/obsidian/worktrees:/worktrees
    expose:
      - "8081"








  obsidian-archive:
    image: wewe-rss-archive:${WEWE_RSS_IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    user: "${HOST_UID}:${HOST_GID}"
    working_dir: /app
    command: ["node", "/app/scripts/obsidian-archive-worker.mjs"]
    environment:
      OBSIDIAN_BASE_URL: http://app:4000
      OBSIDIAN_VAULT_PATH: /vault/WeWe-RSS-AI
      OBSIDIAN_DISCOVER_FEEDS: "true"
      OBSIDIAN_INCLUDE_ALL_FEED: "false"
      OBSIDIAN_FEED_MODE: fulltext
      OBSIDIAN_FEED_LIMIT: "10"
      OBSIDIAN_TIMEOUT_MS: "120000"
      OBSIDIAN_ARCHIVE_INTERVAL_MINUTES: "1440"
      OBSIDIAN_REPAIR_FEED_SOURCED: "true"
      OBSIDIAN_GIT_SYNC: "true"
      OBSIDIAN_GIT_REMOTE: origin
      OBSIDIAN_GIT_BRANCH: main
      OBSIDIAN_GIT_REMOTE_PATH: /repos/folo-rss-vault.git
      GIT_AUTHOR_NAME: WeWe RSS Archive Bot
      GIT_AUTHOR_EMAIL: archive-bot@z001.local
    volumes:
      - /home/ifs1/app/wewe-rss-src:/app:ro
      - ${STACK_ROOT}/data/obsidian/worktrees/folo-rss-vault:/vault
      - ${STACK_ROOT}/data/obsidian/repos:/repos
  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
      bridge:
        condition: service_started
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
